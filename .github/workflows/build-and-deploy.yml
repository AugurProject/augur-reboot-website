name: Build and Deploy Augur Site with Fork Risk Monitoring

on:
  schedule:
    - cron: '0 * * * *'  # Every hour
  workflow_dispatch:
    inputs:
      eth_rpc_url:
        description: 'Custom Ethereum RPC URL (optional)'
        required: false
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: fork-risk-pipeline
  cancel-in-progress: false

jobs:
  risk-monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Restore event cache
        uses: actions/cache/restore@v5
        with:
          path: public/cache/event-cache.json
          key: event-cache-v2-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            event-cache-v2-
            event-cache-v1

      - name: Record cache update boundary
        id: cache-update-boundary
        run: echo "started-at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Run fork risk calculation
        run: npm run build:fork-data
        env:
          ETH_RPC_URL: ${{ secrets.ETH_RPC_URL || '' }}
          CALCULATION_MODE: 'incremental'

      - name: Verify updated event cache
        env:
          CACHE_UPDATE_STARTED_AT: ${{ steps.cache-update-boundary.outputs.started-at }}
        run: |
          node --input-type=module -e '
            import { readFileSync } from "node:fs";
            const cache = JSON.parse(readFileSync("public/cache/event-cache.json", "utf8"));
            const generatedAt = Date.parse(cache.metadata?.cacheGeneratedAt ?? "");
            const updateStartedAt = Date.parse(process.env.CACHE_UPDATE_STARTED_AT ?? "");
            if (!cache.lastQueriedBlock || !Number.isFinite(generatedAt) || generatedAt < updateStartedAt) {
              throw new Error("Event cache was not updated during this run");
            }
          '

      - name: Upload fork-risk data
        uses: actions/upload-artifact@v7
        with:
          name: fork-risk-data
          path: public/data/fork-risk.json
          retention-days: 1

      - name: Save updated event cache
        if: github.ref == 'refs/heads/main'
        uses: actions/cache/save@v5
        with:
          path: public/cache/event-cache.json
          key: event-cache-v2-${{ github.run_id }}-${{ github.run_attempt }}

  build:
    needs: risk-monitor
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download fork-risk data
        uses: actions/download-artifact@v8
        with:
          name: fork-risk-data
          path: public/data

      - name: Verify fork-risk data exists
        run: test -f public/data/fork-risk.json

      - name: Check
        run: npm run check

      - name: Build site
        run: npm run build
        env:
          SITE_URL: ${{ vars.SITE_URL }}
          BASE_PATH: ${{ vars.BASE_PATH }}
          PUBLIC_GA_ID: ${{ vars.PUBLIC_GA_ID }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist/

  deploy:
    needs: [risk-monitor, build]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: github-pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
