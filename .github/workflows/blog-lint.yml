name: Blog publishing diagnostics

on:
  pull_request:
    paths:
      - 'src/content/blog/**'
      - 'src/content/config.ts'
      - 'scripts/blog-lint/**'
      - 'tests/fixtures/blog-lint/**'
      - '.agents/skills/blogging/**'
      - 'docs/blog-feature.md'
      - 'AGENTS.md'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.scripts.json'
      - '.github/workflows/blog-lint.yml'

permissions:
  contents: read

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pull request
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test blog diagnostics
        run: npm run test:blog-lint

      - name: Typecheck repository scripts
        run: npm run typecheck:scripts

      - name: Lint blog
        run: npm run lint:blog -- --changed --base "$PR_BASE_SHA"
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
